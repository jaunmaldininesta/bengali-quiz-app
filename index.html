<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাল্টি-লেভেল শাফল কুইজ গেম</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --correct-color: #10b981;
            --wrong-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
        }

        #progress-bar {
            width: 100%;
            height: 6px;
            background-color: #334155;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
        }

        .btn {
            background-color: #334155;
            color: var(--text-main);
            border: 2px solid transparent;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s ease;
        }

        .btn:hover:not(:disabled) {
            background-color: #475569;
        }

        .btn:disabled {
            cursor: not-allowed;
        }

        .btn.correct {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: var(--correct-color);
            color: #34d399;
        }

        .btn.wrong {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: var(--wrong-color);
            color: #f87171;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .next-btn:hover {
            background-color: var(--primary-hover);
        }

        .hide {
            display: none !important;
        }

        .score-container, .level-container {
            text-align: center;
            padding: 20px 0;
        }

        .score-num {
            font-size: 3rem;
            color: var(--primary-color);
            font-weight: 700;
            margin: 15px 0;
        }

        .level-menu {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        
        .level-card {
            background: #334155;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .level-card:hover {
            border-color: var(--primary-color);
            background: #3e4e68;
        }
    </style>
</head>

<body>

    <div class="quiz-container">
        <div id="level-box" class="level-container">
            <h2>কুইজ লেভেল নির্বাচন করুন</h2>
            <p class="subtitle">আপনার পছন্দের লেভেলটি বেছে নিয়ে খেলা শুরু করুন</p>
            <div class="level-menu">
                <div class="level-card" onclick="selectLevel('level1')">
                    <h3>লেভেল ১ (Level 1)</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">সাধারণ জ্ঞান, গণিত ও কম্পিউটার</p>
                </div>
                <div class="level-card" onclick="selectLevel('level2')">
                    <h3>লেভেল ২ (Level 2)</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">অ্যাডভান্সড টপিকস</p>
                </div>
            </div>
        </div>

        <div id="quiz-box" class="hide">
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="quiz-header">
                <div style="display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 5px;">

                    <span id="question-counter">০/০</span>
                </div>
                <h2 id="question">প্রশ্ন লোড হচ্ছে...</h2>
            </div>
            <div id="answer-buttons" class="btn-grid"></div>
            <div class="actions">
                <button id="home-btn" class="next-btn" style="background-color: #64748b;">মেনু</button>
                <button id="next-btn" class="next-btn hide">পরবর্তী প্রশ্ন</button>
            </div>
        </div>

        <div id="score-box" class="score-container hide">
            <h2 id="score-title">কুইজ সম্পন্ন হয়েছে!</h2>
            <div class="score-num" id="final-score">0 / 0</div>
            <p id="score-commentary" style="color: var(--text-muted); margin-bottom: 24px;"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="main-menu-btn" class="next-btn" style="background-color: #64748b;">প্রধান মেনু</button>
                <button id="action-step-btn" class="next-btn">আবার খেলুন</button>
            </div>
        </div>
    </div>

        // DOM Elements
        const levelBox = document.getElementById("level-box");
        const quizBox = document.getElementById("quiz-box");
        const scoreBox = document.getElementById("score-box");
        const questionElement = document.getElementById("question");
        const answerButtonsElement = document.getElementById("answer-buttons");
        const nextButton = document.getElementById("next-btn");
        const homeButton = document.getElementById("home-btn");
        const actionStepBtn = document.getElementById("action-step-btn");
        const mainMenuBtn = document.getElementById("main-menu-btn");
        const finalScoreElement = document.getElementById("final-score");
        const scoreCommentary = document.getElementById("score-commentary");
        const progressFill = document.getElementById("progress-fill");
        const currentRoundTitle = document.getElementById("current-round-title");
        const questionCounter = document.getElementById("question-counter");

        // App States
        let currentLevel = 'level1';
        let activeQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // ওলটপালট (Shuffle) ফাংশন
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // লেভেল নির্বাচন
        function selectLevel(levelKey) {
            currentLevel = levelKey;
            let originalQuestions = quizDatabase[levelKey] || [];
            
            if(originalQuestions.length === 0) {
                alert("এই লেভেলে এখনো কোনো প্রশ্ন যুক্ত করা হয়নি!");
                return;
            }
            
            // গভীর কপি তৈরি করে সম্পূর্ণ ডাটাবেজ একবারে শাফল করা হলো
            activeQuestions = shuffleArray(JSON.parse(JSON.stringify(originalQuestions)));
            startQuiz();
        }

        // কুইজ শুরু
        function startQuiz() {
            score = 0;
            currentQuestionIndex = 0;

            levelBox.classList.add("hide");
            scoreBox.classList.add("hide");
            quizBox.classList.remove("hide");

            showQuestion();
        }

        // প্রশ্ন প্রদর্শন
        function showQuestion() {
            resetState();
            updateProgress();

            let currentQuestion = activeQuestions[currentQuestionIndex];
            
            currentRoundTitle.innerHTML = `লেভেল ${currentLevel.replace('level','')}`;
            questionCounter.innerHTML = `${currentQuestionIndex + 1} / ${activeQuestions.length}`;
            
            // পূর্বের হার্ডকোডেড সিরিয়াল থাকলে তা বাদ দিয়ে ডায়নামিক সিরিয়াল যোগ
            questionElement.innerHTML = `${currentQuestionIndex + 1}. ${currentQuestion.question.replace(/^\d+\.\s*/, '')}`;

            // অপশনগুলো ওলটপালট করা
            let shuffledAnswers = shuffleArray([...currentQuestion.answers]);

            shuffledAnswers.forEach(answer => {
                const button = document.createElement("button");
                button.innerHTML = answer.text;
                button.classList.add("btn");
                if (answer.correct) {
                    button.dataset.correct = answer.correct;
                }
                button.addEventListener("click", selectAnswer);
                answerButtonsElement.appendChild(button);
            });
        }

        // রিমুভ ও রিসেট স্টেট
        function resetState() {
            nextButton.classList.add("hide");
            while (answerButtonsElement.firstChild) {
                answerButtonsElement.removeChild(answerButtonsElement.firstChild);
            }
        }

        // প্রোগ্রেস বার আপডেট
        function updateProgress() {
            const percentage = (currentQuestionIndex / activeQuestions.length) * 100;
            progressFill.style.width = `${percentage}%`;
        }

        // উত্তর নির্বাচন হ্যান্ডলার
        function selectAnswer(e) {
            const selectedBtn = e.target;
            const isCorrect = selectedBtn.dataset.correct === "true";

            if (isCorrect) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
            }

            // সঠিক উত্তরটি সবুজ করা এবং অন্যান্য বাটন লক করা
            Array.from(answerButtonsElement.children).forEach(button => {
                if (button.dataset.correct === "true") {
                    button.classList.add("correct");
                }
                button.disabled = true;
            });

            nextButton.classList.remove("hide");
        }

        // ফাইনাল স্কোর প্রদর্শন
        function showScore() {
            resetState();
            progressFill.style.width = "100%";
            quizBox.classList.add("hide");
            scoreBox.classList.remove("hide");

            finalScoreElement.innerHTML = `${score} / ${activeQuestions.length}`;

            actionStepBtn.innerHTML = "আবার খেলুন";
            actionStepBtn.onclick = () => {
                selectLevel(currentLevel);
            };

            const passRate = score / activeQuestions.length;
            if (passRate === 1) {
                scoreCommentary.innerHTML = "অসাধারণ! আপনি সব প্রশ্নের সঠিক উত্তর দিয়েছেন।";
            } else if (passRate >= 0.7) {
                scoreCommentary.innerHTML = "খুব ভালো হয়েছে! আপনার স্কোর বেশ চমৎকার।";
            } else {
                scoreCommentary.innerHTML = "আরেকটু চেষ্টা করুন এবং দক্ষতা বাড়ান!";
            }
        }

        // পরবর্তী প্রশ্ন বাটন ক্লিক হ্যান্ডলার
        function handleNextButton() {
            currentQuestionIndex++;
            if (currentQuestionIndex < activeQuestions.length) {
                showQuestion();
            } else {
                showScore();
            }
        }

        // প্রধান মেনুতে ফিরে যাওয়া
        function goToMainMenu() {
            quizBox.classList.add("hide");
            scoreBox.classList.add("hide");
            levelBox.classList.remove("hide");
        }

        // ইভেন্ট লিসেনার
        nextButton.addEventListener("click", handleNextButton);
        homeButton.addEventListener("click", goToMainMenu);
        mainMenuBtn.addEventListener("click", goToMainMenu);
    </script>
</body>
